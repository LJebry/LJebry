<svg width="900" height="190" viewBox="0 0 900 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry Robayo GitHub snapshot</title>
  <desc id="desc">Static profile summary showing frontend focus, full-stack range, and featured builds.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.44" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="190" rx="22" fill="#020617"/>
  <rect width="900" height="190" rx="22" fill="url(#bg)" opacity="0.34"/>
  <circle cx="818" cy="22" r="128" fill="#38BDF8" opacity="0.10"/>
  <circle cx="74" cy="182" r="126" fill="#14B8A6" opacity="0.10"/>
  <text x="40" y="48" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">GitHub Snapshot</text>
  <text x="40" y="78" fill="#BAE6FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Frontend-focused full-stack developer building polished web products.</text>
  <rect x="40" y="106" width="240" height="48" rx="14" fill="#0F172A" opacity="0.84"/>
  <text x="60" y="127" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">PRIMARY FOCUS</text>
  <text x="60" y="146" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">React, Next.js, TypeScript</text>
  <rect x="310" y="106" width="240" height="48" rx="14" fill="#0F172A" opacity="0.84"/>
  <text x="330" y="127" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">FULL-STACK RANGE</text>
  <text x="330" y="146" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">APIs, auth, data, realtime</text>
  <rect x="580" y="106" width="280" height="48" rx="14" fill="#0F172A" opacity="0.84"/>
  <text x="600" y="127" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">FEATURED BUILDS</text>
  <text x="600" y="146" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">EchoLingo, WebDrop, VETPET</text>
